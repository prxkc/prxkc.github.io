<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakil</title>
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: #000000;
        }

        #blackhole-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        #bh {
            width: 100vw;
            height: 100vh;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-content {
            text-align: center;
        }

        .loader-percentage {
            font-family: 'Space Mono', monospace;
            color: #FFFFFF;
            font-size: clamp(0.5rem, 2vw, 1.1rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        /* Main content */
        .main-content {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            position: relative;
            z-index: 2;
        }

        .content-wrapper {
            text-align: center;
            color: #ffffff;
        }

        .content-wrapper h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #C77064;
        }

        .content-wrapper p {
            font-size: 1.5rem;
            color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(30px);
        }

        /* Top left name */
        .brand-name {
            position: fixed;
            top: 60px;
            left: 60px;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 100;
            opacity: 0;
        }

        .brand-name .name-line-wrap {
            overflow: hidden;
            display: block;
        }

        .brand-name .name-line {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -0.02em;
            display: block;
        }

        /* About heading (replaces brand name) */
        .about-heading {
            position: fixed;
            top: 60px;
            left: 60px;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 100;
            opacity: 0;
            display: none;
        }

        .about-heading.active {
            display: block;
        }

        .about-heading .about-title-wrap {
            overflow: hidden;
            display: block;
        }

        .about-heading .about-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -0.02em;
            display: block;
        }

        /* Top right about */
        .top-right {
            position: fixed;
            top: 60px;
            right: 60px;
            z-index: 100;
            opacity: 0;
        }

        .link {
            height: 22px;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .mask {
            position: relative;
            padding: 0;
            height: 16px;
            overflow: hidden;
        }

        .link-container {
            transition: transform 0.4s ease;
        }

        .title {
            display: block;
            font-size: 16px;
            line-height: 16px;
            transition: transform 0.4s ease;
            font-weight: 500;
        }

        .link-title1 {
            transform-origin: right center;
        }

        .link-title2 {
            transform-origin: left center;
            transform: rotate(20deg);
        }

        /* Hover Action - disabled during animations */
        .link:not(.animating):hover .link-container {
            transform: translateY(-16px);
        }

        .link:not(.animating):hover .link-title1 {
            transform: rotate(20deg);
        }

        .link:not(.animating):hover .link-title2 {
            transform: rotate(0);
        }

        /* Disable transitions during GSAP animations */
        .link.animating .link-container {
            transition: none !important;
        }

        .link.animating .title {
            transition: none !important;
        }

        /* About section */
        .about-section {
            height: 100vh;
            display: none;
            padding: 50px;
            padding-left: 60px;
            padding-top: 0;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .about-section.active {
            display: block;
        }

        .about-wrapper {
            text-align: left;
            max-width: 800px;
            margin-top: 240px;
            width: 100%;
        }

        .about-text {
            font-size: 0.9rem;
            color: #ffffff;
            line-height: 1.5;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: left;
        }

        .about-text .split-line-wrapper {
            overflow: hidden;
            display: block;
        }

        .about-text .split-line {
            display: block;
        }

        .about-text a {
            color: #ffffff;
            text-decoration: none;
        }

        .about-text a:visited {
            color: #ffffff;
        }

        .about-text a:hover {
            color: #cccccc;
        }

        /* Masked Text Reveal */
        .content-wrapper h1,
        .content-wrapper p {
            overflow: hidden;
        }

        .line,
        .about-line {
            overflow: hidden;
            display: block;
        }

        .word,
        .letter {
            display: inline-block;
        }

        /* Project list */
        .project-list {
            position: fixed;
            top: 400px;
            left: 60px;
            z-index: 100;
            opacity: 0;
        }

        .project-list-heading {
            font-size: 0.75rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .project-list-heading .project-inner {
            display: block;
        }

        .project-list-item {
            display: flex;
            align-items: baseline;
            gap: 16px;
            font-size: 0.85rem;
            color: #ffffff;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 2;
            overflow: hidden;
        }

        .project-number {
            font-size: 0.7rem;
            color: #888;
            font-variant-numeric: tabular-nums;
        }

        .project-list-item a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .project-list-item a:hover {
            color: #C77064;
        }

        .project-list-item .project-inner {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .datetime-display {
            position: fixed;
            bottom: 60px;
            left: 60px;
            z-index: 100;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #ffffff;
            letter-spacing: 0.04em;
            opacity: 0;
        }

    </style>
</head>

<body>
    
    <div id="blackhole-bg">
        <canvas id="bh"></canvas>
    </div>
    <script>
    (function(){
        
        // Full-bleed cinematic pixel space background
        const canvas = document.getElementById('bh');
        const ctx = canvas.getContext('2d', { alpha: true });
        ctx.imageSmoothingEnabled = false;

        // Smaller rendered pixels for a finer, denser image.
        const PIXEL = 2;
        const BAYER8 = [
             0,32, 8,40, 2,34,10,42,
            48,16,56,24,50,18,58,26,
            12,44, 4,36,14,46, 6,38,
            60,28,52,20,62,30,54,22,
             3,35,11,43, 1,33, 9,41,
            51,19,59,27,49,17,57,25,
            15,47, 7,39,13,45, 5,37,
            63,31,55,23,61,29,53,21
        ].map(v => (v + 1) / 65);

        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const smooth = (x) => x * x * (3 - 2 * x);
        const bayer = (x, y) => BAYER8[((y & 7) * 8) + (x & 7)];
        const h = (x, y, s = 0) => {
            const v = Math.sin(x * 127.1 + y * 311.7 + s * 74.7) * 43758.5453123;
            return v - Math.floor(v);
        };
        const fbm = (x, y, oct = 3) => {
            let v = 0, a = 0.5;
            for (let i = 0; i < oct; i++) {
                v += a * h(Math.floor(x), Math.floor(y), i);
                x *= 2.07;
                y *= 2.07;
                a *= 0.5;
            }
            return v;
        };

        const mix = (a, b, t) => a + (b - a) * t;

        let W = 0, H = 0, time = 0;
        let img, buf, stars = [];

        function writePixel(x, y, r, g, b, size = 1) {
            for (let oy = 0; oy < size; oy++) {
                for (let ox = 0; ox < size; ox++) {
                    const px = x + ox;
                    const py = y + oy;
                    if (px < 0 || py < 0 || px >= W || py >= H) continue;
                    const i = (py * W + px) * 4;
                    buf[i] = r;
                    buf[i + 1] = g;
                    buf[i + 2] = b;
                    buf[i + 3] = 255;
                }
            }
        }

        function resize() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            W = Math.max(420, Math.floor(vw / PIXEL));
            H = Math.max(240, Math.floor(vh / PIXEL));
            canvas.width = W;
            canvas.height = H;
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.imageRendering = 'pixelated';
            img = ctx.createImageData(W, H);
            buf = img.data;
            buildField();
        }

        function buildField() {
            stars = [];
            // Sparse background only; keep empty black space dominant.
            const starCount = Math.max(30, Math.floor(W * H * 0.00018));
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: h(i * 1.73, i * 7.11, 1),
                    y: h(i * 4.91, i * 2.33, 2),
                    depth: Math.pow(h(i * 8.23, i * 5.12, 3), 2.7),
                    tw: h(i * 9.13, i * 3.77, 4)
                });
            }
        }

        function starColor(depth, tw, lum) {
            const t = clamp(lum, 0, 1);
            const hot = smooth(clamp((t - 0.58) / 0.42, 0, 1));
            const cool = 1 - hot;
            const r = mix(190, 255, hot);
            const g = mix(205, 248, hot);
            const b = mix(220, 240, hot) * cool + 240 * hot;
            return [r, g, b];
        }

        function diskColor(lum) {
            // Strong orange/yellow shift honoring Doppler beaming ranges
            const hot = smooth(clamp((lum - 0.05) / 0.8, 0, 1));
            const gold = smooth(clamp((lum - 0.4) / 0.8, 0, 1));
            const white = smooth(clamp((lum - 1.3) / 1.0, 0, 1)); // Engages on extreme doppler shift

            const r = mix(160, 255, hot);
            const g = mix(30, 255, gold + white * 1.5);
            const b = mix(5, 255, gold * gold + white * 2.0);

            return [clamp(r, 0, 255), clamp(g, 0, 255), clamp(b, 0, 255)];
        }

        function draw() {
            buf.fill(0);

            const cx = W * 0.58; // Slightly right off-center
            const cy = H * 0.48; // Slightly up
            
            // True spherical scale
            const R_shadow = Math.min(W, H) * 0.11; // Smaller relative size for intense look
            const R_inner = R_shadow * 1.5;
            const tilt = 0.28; // Disk perspective tilt
            const ang = -0.15; // Camera roll
            const ca = Math.cos(ang), sa = Math.sin(ang);

            // 1. Draw Stars with Gravitational Lensing
            for (const s of stars) {
                let sx = s.x * W;
                let sy = s.y * H;
                let dx = sx - cx;
                let dy = sy - cy;
                let dist2 = dx * dx + dy * dy;
                const R_s2 = R_shadow * R_shadow;

                // Extreme lensing displaces stars outward organically
                let lensFactor = 1.0 + 1.5 * R_s2 / (dist2 + 1.0);
                let x = cx + dx * lensFactor;
                let y = cy + dy * lensFactor;

                const px = Math.round(x);
                const py = Math.round(y);

                // Hide stars fully covered by the event horizon
                const l_dx = px - cx;
                const l_dy = py - cy;
                if (l_dx * l_dx + l_dy * l_dy < R_s2) continue;

                const tw = 0.78 + 0.22 * Math.sin(time * 1.5 + s.tw * 22.0);
                const lum = (0.13 + (1 - s.depth) * 0.11) * tw;
                const starSize = s.depth > 0.94 ? 2 : 1;
                const threshold = starSize === 2 ? 0.955 : 0.985;
                if (lum > bayer(px, py) * threshold) {
                    const [r, g, b] = starColor(s.depth, s.tw, lum);
                    writePixel(px, py, r, g, b, starSize);
                }
            }

            // 2. Draw Black Hole Volumetric Accretion Disk
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    const dx = x - cx;
                    const dy = y - cy;

                    const rx = dx * ca - dy * sa;
                    const ry = dx * sa + dy * ca;
                    const r = Math.hypot(rx, ry);
                    const disk_r = Math.hypot(rx, ry / tilt);

                    // Event Horizon pure black mask (3D Occlusion)
                    if (r <= R_shadow) {
                        // The bottom half of the disk (closer to viewer) covers the black hole
                        const isFrontDisk = (ry > 0 && disk_r >= R_inner);
                        if (!isFrontDisk) {
                            writePixel(x, y, 0, 0, 0, 1);
                            continue;
                        }
                    }

                    let brightness = 0;

                    // Gravitational Lensing Halo (Back of the disk bent over the top)
                    if (r > R_shadow) {
                        let hDist = r - R_shadow;
                        // Biased toward top half
                        let topWeight = clamp(0.5 - 0.6 * (ry / r), 0, 1);
                        let hProfile = Math.exp(-hDist * hDist / (R_shadow * R_shadow * 0.15));

                        // Doppler beaming: approaching side (rx < 0) is much brighter
                        let doppler = clamp(1.0 - 0.85 * (rx / (R_shadow * 1.2)), 0.1, 2.5);

                        let hAngle = Math.atan2(ry, rx);
                        let spiralTh = hAngle + time * 3.5;
                        let noise = fbm(spiralTh * 4.0, hDist * 0.3 - time, 2);

                        brightness += hProfile * (0.2 + 0.8 * topWeight) * doppler * (0.4 + 1.2 * noise) * 2.0;
                    }

                    // Flat Volumetric Accretion Disk
                    if (disk_r >= R_inner) {
                        let dDist = disk_r - R_inner;
                        let dProfile = Math.exp(-dDist * dDist / (R_inner * R_inner * 3.5));
                        dProfile += 0.2 * Math.exp(-dDist * dDist / (R_inner * R_inner * 12.0)); // Faint outer spread

                        // Relativistic Doppler Beaming
                        let doppler = clamp(1.0 - 0.85 * (rx / R_inner), 0.1, 3.0);

                        let dAngle = Math.atan2(ry / tilt, rx);
                        let rotSpeed = 1.0 + 1.8 * (R_inner / disk_r); // Spiraling shear
                        let spiralTh = dAngle + rotSpeed * time * 0.8;

                        let noise = fbm(disk_r * 0.05 - time * 0.3, spiralTh * 6.0, 3);
                        let streams = Math.pow(0.5 + 0.5 * Math.sin(spiralTh * 10.0 - disk_r * 0.1), 2.0);

                        let diskInt = dProfile * doppler * (0.3 + 0.7 * noise) * (0.4 + 0.6 * streams) * 3.0;

                        // Hide the back side of the flat disk falling behind the event horizon
                        if (!(ry < 0 && r <= R_shadow)) {
                            brightness += diskInt;
                        }
                    }

                    // Intense glowing photon ring boundary
                    if (Math.abs(r - R_shadow) < W * 0.003) {
                        let doppler = clamp(1.0 - 0.8 * (rx / R_shadow), 0.2, 3.0);
                        brightness += 1.0 * doppler;
                    }

                    if (brightness > 0) {
                        // High-frequency granularity for pixelated particle feel
                        brightness *= 0.85 + 0.15 * h(x, y, 9);
                        brightness = clamp(brightness, 0, 3.0);

                        let density = clamp(brightness * 0.7, 0, 1.1);
                        const threshold = bayer(x, y);

                        if (density > threshold) {
                            const [rC, gC, bC] = diskColor(brightness);
                            // Beaming core gets thicker pixels to blow out and look wildly powerful
                            const size = brightness > 1.8 ? 2 : 1;
                            writePixel(x, y, rC, gC, bC, size);
                        }
                    }
                }
            }

            ctx.putImageData(img, 0, 0);
            time += 0.005;
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize, { passive: true });
        resize();
        draw();
    })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/CustomEase.min.js"></script>

    <script>
        // Register GSAP plugins
        gsap.registerPlugin(SplitText, CustomEase);
        CustomEase.create("osmo-ease", "0.625, 0.05, 0, 1");

        let h1Split, pSplit, aboutHeadingSplit;

        // Initialize after fonts load
        document.fonts.ready.then(function () {
            initTextAnimations();
        });

        function initTextAnimations() {
            // Set content first
            const h1 = document.querySelector('.content-wrapper h1');
            const p = document.querySelector('.content-wrapper p');
            const aboutHeading = document.querySelector('.about-heading .about-title');

            h1.textContent = 'Welcome!';
            p.textContent = 'Your content has loaded successfully with a beautiful animation.';

            // Create SplitText instances with automatic masking
            h1Split = new SplitText(h1, {
                type: "lines",
                linesClass: "line"
            });

            pSplit = new SplitText(p, {
                type: "lines",
                linesClass: "line"
            });

            // Split "ABOUT" heading for reveal
            aboutHeadingSplit = new SplitText(aboutHeading, {
                type: "lines",
                linesClass: "about-line"
            });

            // Hide project list items initially for animation
            gsap.set('#project-list .project-inner', { yPercent: 110 });
        }

        function animateMainText() {
            // This will be called AFTER preloader is done
            if (h1Split && h1Split.lines) {
                gsap.fromTo(h1Split.lines,
                    { yPercent: 110 },
                    {
                        yPercent: 0,
                        duration: 0.8,
                        stagger: 0.08,
                        ease: "osmo-ease"
                    }
                );
            }

            if (pSplit && pSplit.lines) {
                gsap.fromTo(pSplit.lines,
                    { yPercent: 110 },
                    {
                        yPercent: 0,
                        duration: 0.8,
                        stagger: 0.08,
                        ease: "osmo-ease",
                        delay: 0.2
                    }
                );
            }
        }

        // Section toggle
        const aboutBtn = document.getElementById('about-btn');
        const homeBtn = document.getElementById('home-btn');
        const brandName = document.getElementById('brand-name');
        const aboutHeadingEl = document.getElementById('about-heading');
        const aboutSection = document.getElementById('about-section');
        const mainContent = document.querySelector('.main-content');

        aboutBtn.addEventListener('click', (e) => {
            e.preventDefault();

            // Add animating class to disable hover
            aboutBtn.classList.add('animating');
            homeBtn.classList.add('animating');

            // Hide About button and reveal Home button (masked slide up)
            gsap.to(aboutBtn.querySelector('.link-container'), {
                yPercent: -110,
                duration: 0.8,
                ease: "power2.in",
                onComplete: () => {
                    aboutBtn.style.display = 'none';
                    aboutBtn.classList.remove('animating');
                    homeBtn.style.display = 'flex';
                    gsap.set(homeBtn.querySelector('.link-container'), { yPercent: 110 });
                    gsap.to(homeBtn.querySelector('.link-container'), {
                        yPercent: 0,
                        duration: 0.9,
                        ease: "power2.out",
                        clearProps: 'transform',
                        onComplete: () => {
                            gsap.set(homeBtn.querySelector('.link-container'), { clearProps: 'all' });
                            homeBtn.classList.remove('animating');
                        }
                    });
                }
            });

            mainContent.style.display = 'none';
            document.getElementById('project-list').style.opacity = '0';
            gsap.set('#project-list .project-inner', { yPercent: 110 });

            // Hide brand name with masked slide - each line slides up separately
            gsap.to(brandName.querySelectorAll('.name-line'), {
                yPercent: -110,
                duration: 0.5,
                stagger: 0.05,
                ease: "power2.inOut",
                onComplete: () => {
                    // After brand name is gone, show about heading from below
                    aboutHeadingEl.classList.add('active');
                    aboutSection.classList.add('active');
                    aboutHeadingEl.style.opacity = 1;

                    // Reveal ABOUT with masked slide up from below
                    gsap.set(aboutHeadingEl.querySelector('.about-title'), { yPercent: 110 });
                    gsap.to(aboutHeadingEl.querySelector('.about-title'), {
                        yPercent: 0,
                        duration: 0.5,
                        ease: "power2.inOut"
                    });

                    // Animate about text lines
                    const aboutLines = document.querySelectorAll('.about-text .split-line');
                    gsap.set(aboutLines, { yPercent: 110 });
                    gsap.to(aboutLines, {
                        yPercent: 0,
                        duration: 0.4,
                        stagger: 0.05,
                        ease: "power2.inOut",
                        delay: 0.2
                    });
                }
            });
        });

        // Home button click handler
        homeBtn.addEventListener('click', () => {
            // Add animating class to disable hover
            homeBtn.classList.add('animating');
            aboutBtn.classList.add('animating');

            // Hide Home button and reveal About button (masked slide up)
            gsap.to(homeBtn.querySelector('.link-container'), {
                yPercent: -110,
                duration: 0.8,
                ease: "power2.in",
                onComplete: () => {
                    homeBtn.style.display = 'none';
                    homeBtn.classList.remove('animating');
                    aboutBtn.style.display = 'flex';
                    gsap.set(aboutBtn.querySelector('.link-container'), { yPercent: 110 });
                    gsap.to(aboutBtn.querySelector('.link-container'), {
                        yPercent: 0,
                        duration: 0.9,
                        ease: "power2.out",
                        clearProps: 'transform',
                        onComplete: () => {
                            gsap.set(aboutBtn.querySelector('.link-container'), { clearProps: 'all' });
                            aboutBtn.classList.remove('animating');
                        }
                    });
                }
            });

            // Hide about text lines first with masked slide up
            const aboutLines = document.querySelectorAll('.about-text .split-line');
            gsap.to(aboutLines, {
                yPercent: -110,
                duration: 0.4,
                stagger: 0.04,
                ease: "power2.inOut",
                onComplete: () => {
                    // Then hide ABOUT heading with masked slide up
                    gsap.to(aboutHeadingEl.querySelector('.about-title'), {
                        yPercent: -110,
                        duration: 0.5,
                        ease: "power2.inOut",
                        onComplete: () => {
                            aboutSection.classList.remove('active');
                            aboutHeadingEl.classList.remove('active');

                            // After ABOUT is gone, reveal brand name from below - each line separately
                            gsap.set(brandName.querySelectorAll('.name-line'), { yPercent: 110 });
                            gsap.to(brandName.querySelectorAll('.name-line'), {
                                yPercent: 0,
                                duration: 0.5,
                                stagger: 0.05,
                                ease: "power2.inOut"
                            });
                            mainContent.style.display = 'flex';
                            gsap.to('#project-list', { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.2 });
                            gsap.to('#project-list .project-inner',
                                { yPercent: 0, duration: 0.5, stagger: 0.06, ease: 'osmo-ease', delay: 0.3 }
                            );
                        }
                    });
                }
            });
        });

        // Click brand name/ABOUT heading to go home (only when on about page)
        brandName.addEventListener('click', () => {
            if (aboutSection.classList.contains('active')) {
                // Trigger home button click
                homeBtn.click();
            }
        });

        // Make ABOUT heading clickable too
        aboutHeadingEl.addEventListener('click', () => {
            if (aboutSection.classList.contains('active')) {
                homeBtn.click();
            }
        });
        aboutHeadingEl.style.cursor = 'pointer';

        // Make brand name clickable
        brandName.style.cursor = 'pointer';
    </script>

    <script>
        // Spring-based CountUp (mirrors CountUp component physics)
        const percentEl = document.querySelector('.loader-percentage');

        const duration  = 2;
        const stiffness = 100 * (1 / duration); // 50
        const damping   = 20 + 40 * (1 / duration); // 40

        let position = 0;
        let velocity = 0;
        let lastTime = null;

        function springStep(timestamp) {
            if (lastTime === null) lastTime = timestamp;
            const dt = Math.min((timestamp - lastTime) / 1000, 0.064);
            lastTime = timestamp;

            const force = stiffness * (100 - position) - damping * velocity;
            velocity += force * dt;
            position += velocity * dt;

            if (position >= 99.5) {
                percentEl.textContent = '100%';
                onLoadingComplete();
                return;
            }

            percentEl.textContent = Math.round(position) + '%';
            requestAnimationFrame(springStep);
        }

        // Start after a brief beat
        setTimeout(() => requestAnimationFrame(springStep), 300);

        function onLoadingComplete() {
            const exitTl = gsap.timeline();

            exitTl.to('.loader-percentage', {
                opacity: 0,
                scale: 0.9,
                duration: 0.4,
                ease: 'power2.in'
            })
                .to('.loader-wrapper', {
                    yPercent: -100,
                    duration: 1,
                    ease: 'power4.inOut',
                    onComplete: function () {
                        document.querySelector('.loader-wrapper').style.display = 'none';
                    }
                })
                .to('.brand-name', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.5')
                .to('.top-right', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.6')
                .add(() => {
                    animateMainText();
                }, '-=0.3')
                .to('#project-list', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.2')
                .add(() => {
                    gsap.to('#project-list .project-inner',
                        {
                            yPercent: 0,
                            duration: 0.6,
                            stagger: 0.08,
                            ease: 'osmo-ease'
                        }
                    );
                }, '-=0.5')
                .to('.datetime-display', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.3');
        }
    </script>
    <script>
        // Live clock
        const MONTHS = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
        const clockEl = document.getElementById('datetime-display');

        function updateClock() {
            const now = new Date();
            const month   = MONTHS[now.getMonth()];
            const day     = now.getDate();
            const year    = now.getFullYear();
            const h24     = now.getHours();
            const ampm    = h24 >= 12 ? 'PM' : 'AM';
            const hours   = String(h24 % 12 || 12).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `[ ${month} ${day}, ${year}, ${hours}:${minutes}:${seconds} ${ampm} ]`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
