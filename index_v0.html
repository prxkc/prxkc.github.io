<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakil</title>
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: #000000;
        }

        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-content {
            text-align: center;
        }

        .loader-percentage {
            font-family: 'Space Mono', monospace;
            color: #FFFFFF;
            font-size: clamp(0.5rem, 2vw, 1.1rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        /* Main content */
        .main-content {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            position: relative;
            z-index: 2;
        }

        .content-wrapper {
            text-align: center;
            color: #ffffff;
        }

        .content-wrapper h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #C77064;
        }

        .content-wrapper p {
            font-size: 1.5rem;
            color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(30px);
        }

        /* Top left name */
        .brand-name {
            position: fixed;
            top: 60px;
            left: 60px;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 100;
            opacity: 0;
        }

        .brand-name .name-line-wrap {
            overflow: hidden;
            display: block;
        }

        .brand-name .name-line {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -0.02em;
            display: block;
        }

        /* About heading (replaces brand name) */
        .about-heading {
            position: fixed;
            top: 60px;
            left: 60px;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 100;
            opacity: 0;
            display: none;
        }

        .about-heading.active {
            display: block;
        }

        .about-heading .about-title-wrap {
            overflow: hidden;
            display: block;
        }

        .about-heading .about-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -0.02em;
            display: block;
        }

        /* Top right about */
        .top-right {
            position: fixed;
            top: 60px;
            right: 60px;
            z-index: 100;
            opacity: 0;
        }

        .link {
            height: 22px;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .mask {
            position: relative;
            padding: 0;
            height: 16px;
            overflow: hidden;
        }

        .link-container {
            transition: transform 0.4s ease;
        }

        .title {
            display: block;
            font-size: 16px;
            line-height: 16px;
            transition: transform 0.4s ease;
            font-weight: 500;
        }

        .link-title1 {
            transform-origin: right center;
        }

        .link-title2 {
            transform-origin: left center;
            transform: rotate(20deg);
        }

        /* Hover Action - disabled during animations */
        .link:not(.animating):hover .link-container {
            transform: translateY(-16px);
        }

        .link:not(.animating):hover .link-title1 {
            transform: rotate(20deg);
        }

        .link:not(.animating):hover .link-title2 {
            transform: rotate(0);
        }

        /* Disable transitions during GSAP animations */
        .link.animating .link-container {
            transition: none !important;
        }

        .link.animating .title {
            transition: none !important;
        }

        /* About section */
        .about-section {
            height: 100vh;
            display: none;
            padding: 50px;
            padding-left: 60px;
            padding-top: 0;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .about-section.active {
            display: block;
        }

        .about-wrapper {
            text-align: left;
            max-width: 800px;
            margin-top: 240px;
            width: 100%;
        }

        .about-text {
            font-size: 0.9rem;
            color: #ffffff;
            line-height: 1.5;
            font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: left;
        }

        .about-text .split-line-wrapper {
            overflow: hidden;
            display: block;
        }

        .about-text .split-line {
            display: block;
        }

        .about-text a {
            color: #ffffff;
            text-decoration: none;
        }

        .about-text a:visited {
            color: #ffffff;
        }

        .about-text a:hover {
            color: #cccccc;
        }

        /* Masked Text Reveal */
        .content-wrapper h1,
        .content-wrapper p {
            overflow: hidden;
        }

        .line,
        .about-line {
            overflow: hidden;
            display: block;
        }

        .word,
        .letter {
            display: inline-block;
        }

        /* Project list */
        .project-list {
            position: fixed;
            top: 400px;
            left: 60px;
            z-index: 100;
            opacity: 0;
        }

        .project-list-heading {
            font-size: 0.75rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .project-list-heading .project-inner {
            display: block;
        }

        .project-list-item {
            display: flex;
            align-items: baseline;
            gap: 16px;
            font-size: 0.85rem;
            color: #ffffff;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 2;
            overflow: hidden;
        }

        .project-number {
            font-size: 0.7rem;
            color: #888;
            font-variant-numeric: tabular-nums;
        }

        .project-list-item a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .project-list-item a:hover {
            color: #C77064;
        }

        .project-list-item .project-inner {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .datetime-display {
            position: fixed;
            bottom: 60px;
            left: 60px;
            z-index: 100;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #ffffff;
            letter-spacing: 0.04em;
            opacity: 0;
        }

    </style>
</head>

<body>
    <!-- ASCII Black Hole Background -->
    <div id="blackhole-bg" style="position:fixed;top:50%;left:58%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;opacity:0.85;">
        <canvas id="bh" style="display:block;"></canvas>
    </div>
    <script>
    (function(){
        const COLS=72, ROWS=26;
        const CW=7, CH=12;
        const cv=document.getElementById('bh');
        cv.width=COLS*CW; cv.height=ROWS*CH;
        const cx=cv.getContext('2d');
        cx.font='10px "Courier New",monospace';
        cx.textBaseline='top';

        const nm=v=>{const l=Math.hypot(v[0],v[1],v[2]);return[v[0]/l,v[1]/l,v[2]/l];};
        const cr=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
        const dt=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
        const ad=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
        const sc=(v,s)=>[v[0]*s,v[1]*s,v[2]*s];
        const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));

        const CHARS=['\u00b7','.',':','+','*','%','#','@'];

        const R_EH=2.5, R_IN=3.0, R_OUT=36;
        const R_PS=R_EH*1.5;
        const INC=Math.PI*0.10, CD=26;
        const cam=[0,CD*Math.sin(INC),CD*Math.cos(INC)];
        const fwd=nm(sc(cam,-1));
        const rgt=nm(cr(fwd,[0,1,0]));
        const upv=nm(cr(rgt,fwd));
        const FOV=0.50, AR=(ROWS*CH)/(COLS*CW);

        function ray(sx,sy){return nm(ad(ad(fwd,sc(rgt,sx*FOV)),sc(upv,sy*FOV*AR)));}

        function iSph(ro,rd,R){
            const b=dt(ro,rd),c=dt(ro,ro)-R*R,d=b*b-c;
            if(d<0)return Infinity;
            const t=-b-Math.sqrt(d);
            return t>0.001?t:Infinity;
        }
        function iDisk(ro,rd){
            if(Math.abs(rd[1])<1e-6)return null;
            const t=-ro[1]/rd[1];
            if(t<0.01)return null;
            const x=ro[0]+t*rd[0],z=ro[2]+t*rd[2],r=Math.hypot(x,z);
            if(r<R_IN||r>R_OUT)return null;
            return{t,x,z,r,a:Math.atan2(z,x)};
        }
        function cpInfo(ro,rd){
            const tc=-dt(ro,rd);
            if(tc<0)return null;
            const pt=ad(ro,sc(rd,tc));
            return{d:Math.hypot(pt[0],pt[1],pt[2]),y:pt[1],tc};
        }

        function sn1(c,r){const v=Math.sin(c*12.9898+r*78.233)*43758.5453;return(v-Math.floor(v));}
        function sn2(c,r){const v=Math.sin(c*63.726+r*157.992)*29847.1;return(v-Math.floor(v));}
        function sn3(c,r){const v=Math.sin(c*19.41+r*43.17)*81723.6;return(v-Math.floor(v));}

        const W=cv.width, H=cv.height;
        const vignette=new Float32Array(COLS*ROWS);
        for(let row=0;row<ROWS;row++){
            const py=(row+0.5)/ROWS;
            for(let col=0;col<COLS;col++){
                const px=(col+0.5)/COLS;
                const dx=(px-0.5)*2, dy=(py-0.5)*2;
                const r=Math.hypot(dx*0.9,dy*1.1);
                const radial=clamp(1-Math.pow(r/1.0,2.2),0,1);
                const eL=clamp(px/0.14,0,1);
                const eR=clamp((1-px)/0.14,0,1);
                const eT=clamp(py/0.18,0,1);
                const eB=clamp((1-py)/0.18,0,1);
                vignette[row*COLS+col]=radial*eL*eR*eT*eB;
            }
        }

        let T=0;

        function draw(){
            cx.clearRect(0,0,W,H);

            for(let row=0;row<ROWS;row++){
                const sy=(0.5-row/ROWS)*2;
                for(let col=0;col<COLS;col++){
                    const sx=(col/COLS-0.5)*2;
                    const rd=ray(sx,sy);
                    const tEH=iSph(cam,rd,R_EH);
                    const dk=iDisk(cam,rd);

                    let emit=0, shadow=false;
                    let rMul=1.0, gMul=1.0, bMul=1.0;

                    if(tEH<Infinity&&(!dk||tEH<dk.t)){
                        shadow=true;
                    } else if(dk){
                        const{r:pr,a:pa}=dk;
                        const radFrac=clamp((pr-R_IN)/(R_OUT-R_IN),0,1);
                        const temp=1-radFrac;
                        const rad=Math.pow(1-radFrac,1.1);
                        const spin=pa-T*1.8+pr*0.22;
                        const band1=Math.sin(spin*3)*0.5+0.5;
                        const band2=Math.sin(spin*7+T*0.4)*0.32+0.32;
                        const band3=Math.sin(spin*13-T*0.25+pr*0.55)*0.22+0.22;
                        const band4=Math.sin(spin*1.6+pr*0.08)*0.28+0.28;
                        const corona=Math.pow(clamp(1-(pr-R_IN)/4.5,0,1),3)*0.45;
                        emit=clamp(rad*0.36+band1*0.26+band2*0.13+band3*0.07+band4*0.09+corona+0.08,0,1);
                        rMul=1.0; gMul=0.80+temp*0.15; bMul=0.48+temp*0.42;
                    } else {
                        const cp=cpInfo(cam,rd);
                        if(cp&&cp.d>R_EH){
                            const d=cp.d;
                            const above=cp.y>0;
                            const rDist=Math.abs(d-R_PS);
                            const ring=rDist<1.4?Math.pow(clamp(1-rDist/1.4,0,1),4)*1.3:0;
                            const haloRange=8.0;
                            const haloBase=d<R_EH+haloRange?Math.pow(clamp(1-(d-R_EH)/haloRange,0,1),2.0):0;
                            const dirBoost=above?1.0:0.50;
                            const shimmer=d<R_EH+2.2?Math.pow(clamp(1-(d-R_EH)/2.2,0,1),6)*0.70:0;
                            const lensedSpin=cp.tc*0.10-T*1.8;
                            const lensedBand=above?(Math.sin(lensedSpin*2.5)*0.35+0.35)*haloBase*0.38:0;
                            emit=clamp(ring*1.1+haloBase*dirBoost*0.9+shimmer+lensedBand,0,1);
                            const warmth=clamp((d-R_EH)/haloRange,0,1);
                            if(above){rMul=1.0;gMul=0.88+ring*0.12-warmth*0.08;bMul=0.50+ring*0.45-warmth*0.32;}
                            else{rMul=1.0;gMul=0.68+ring*0.20;bMul=0.22+ring*0.35;}
                        }
                    }

                    if(!shadow){
                        const n1=sn1(col,row),n2=sn2(col,row),n3=sn3(col,row);
                        const s1=n1>0.62?(n1-0.62)/0.38*0.30:0;
                        const s2=n2>0.70?(n2-0.70)/0.30*0.22:0;
                        const s3=n3>0.78?(n3-0.78)/0.22*0.16:0;
                        emit=clamp(emit+(1-emit*0.8)*Math.max(s1,s2,s3)*0.6,0,1);
                    }

                    const vig=vignette[row*COLS+col];
                    emit*=vig;

                    if(!shadow&&emit>0.015){
                        const v=Math.floor(emit*255);
                        cx.fillStyle=`rgb(${Math.min(255,Math.floor(v*rMul))},${Math.min(255,Math.floor(v*gMul))},${Math.min(255,Math.floor(v*bMul))})`;
                        cx.fillText(CHARS[Math.min(CHARS.length-1,Math.floor(emit*CHARS.length))],col*CW,row*CH);
                    }
                }
            }

            T+=0.003;
            requestAnimationFrame(draw);
        }

        draw();
    })();
    </script>

    <!-- Date/time -->
    <div class="datetime-display" id="datetime-display"></div>

    <!-- Loading Screen -->
    <div class="loader-wrapper">
        <div class="loader-content">
            <div class="loader-percentage">0%</div>
        </div>
    </div>

    <!-- Brand name -->
    <div class="brand-name" id="brand-name">
        <div class="name-line-wrap">
            <span class="name-line">SHAKIL</span>
        </div>
        <div class="name-line-wrap">
            <span class="name-line">ISLAM</span>
        </div>
        <div class="name-line-wrap">
            <span class="name-line">SHANTO</span>
        </div>
    </div>

    <!-- Project list below brand name -->
    <div class="project-list" id="project-list">
        <div class="project-list-heading"><span class="project-inner">PROJECTS</span></div>
        <div class="project-list-item"><span class="project-inner"><span class="project-number">001</span><a
                    href="https://huggingface.co/prxkc/jersey-number-recognition" target="_blank">Temporal Jersey Number
                    Recognition</a></span></div>
        <div class="project-list-item"><span class="project-inner"><span class="project-number">002</span><a
                    href="https://github.com/prxkc/healthcare-rag-assistant" target="_blank">Healthcare RAG Assistant
                    </a></span></div>
        <div class="project-list-item"><span class="project-inner"><span class="project-number">004</span><a
                    href="https://tododo-mocha.vercel.app/" target="_blank">Dependency-aware To-do
                    App</a></span></div>

    </div>

    <!-- About heading (hidden by default) -->
    <div class="about-heading" id="about-heading">
        <div class="about-title-wrap">
            <span class="about-title">ABOUT ME</span>
        </div>
    </div>

    <!-- Top right navigation -->
    <div class="top-right">
        <a href="#about" class="link" id="about-btn">
            <span class="mask">
                <div class="link-container">
                    <span class="link-title1 title">About</span>
                    <span class="link-title2 title">About</span>
                </div>
            </span>
        </a>
        <button class="link" id="home-btn" style="display: none;">
            <span class="mask">
                <div class="link-container">
                    <span class="link-title1 title">Home</span>
                    <span class="link-title2 title">Home</span>
                </div>
            </span>
        </button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="content-wrapper">
            <h1 class="reveal-element"></h1>
            <p class="reveal-element"></p>
        </div>
    </div>

    <!-- About section -->
    <div class="about-section" id="about-section">
        <div class="about-wrapper">
            <div class="about-text">
                <div class="split-line-wrapper">
                    <div class="split-line">Hey — I'm Shakil, a CSE grad from BRAC University, based in Dhaka.</div>
                </div>
                <div class="split-line-wrapper">
                    <div class="split-line">AI Engineer and web security enthusiast.</div>
                </div>
                <div class="split-line-wrapper">
                    <div class="split-line">Gamer, but too busy to game.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/CustomEase.min.js"></script>

    <script>
        // Register GSAP plugins
        gsap.registerPlugin(SplitText, CustomEase);
        CustomEase.create("osmo-ease", "0.625, 0.05, 0, 1");

        let h1Split, pSplit, aboutHeadingSplit;

        // Initialize after fonts load
        document.fonts.ready.then(function () {
            initTextAnimations();
        });

        function initTextAnimations() {
            // Set content first
            const h1 = document.querySelector('.content-wrapper h1');
            const p = document.querySelector('.content-wrapper p');
            const aboutHeading = document.querySelector('.about-heading .about-title');

            h1.textContent = 'Welcome!';
            p.textContent = 'Your content has loaded successfully with a beautiful animation.';

            // Create SplitText instances with automatic masking
            h1Split = new SplitText(h1, {
                type: "lines",
                linesClass: "line"
            });

            pSplit = new SplitText(p, {
                type: "lines",
                linesClass: "line"
            });

            // Split "ABOUT" heading for reveal
            aboutHeadingSplit = new SplitText(aboutHeading, {
                type: "lines",
                linesClass: "about-line"
            });

            // Hide project list items initially for animation
            gsap.set('#project-list .project-inner', { yPercent: 110 });
        }

        function animateMainText() {
            // This will be called AFTER preloader is done
            if (h1Split && h1Split.lines) {
                gsap.fromTo(h1Split.lines,
                    { yPercent: 110 },
                    {
                        yPercent: 0,
                        duration: 0.8,
                        stagger: 0.08,
                        ease: "osmo-ease"
                    }
                );
            }

            if (pSplit && pSplit.lines) {
                gsap.fromTo(pSplit.lines,
                    { yPercent: 110 },
                    {
                        yPercent: 0,
                        duration: 0.8,
                        stagger: 0.08,
                        ease: "osmo-ease",
                        delay: 0.2
                    }
                );
            }
        }

        // Section toggle
        const aboutBtn = document.getElementById('about-btn');
        const homeBtn = document.getElementById('home-btn');
        const brandName = document.getElementById('brand-name');
        const aboutHeadingEl = document.getElementById('about-heading');
        const aboutSection = document.getElementById('about-section');
        const mainContent = document.querySelector('.main-content');

        aboutBtn.addEventListener('click', (e) => {
            e.preventDefault();

            // Add animating class to disable hover
            aboutBtn.classList.add('animating');
            homeBtn.classList.add('animating');

            // Hide About button and reveal Home button (masked slide up)
            gsap.to(aboutBtn.querySelector('.link-container'), {
                yPercent: -110,
                duration: 0.8,
                ease: "power2.in",
                onComplete: () => {
                    aboutBtn.style.display = 'none';
                    aboutBtn.classList.remove('animating');
                    homeBtn.style.display = 'flex';
                    gsap.set(homeBtn.querySelector('.link-container'), { yPercent: 110 });
                    gsap.to(homeBtn.querySelector('.link-container'), {
                        yPercent: 0,
                        duration: 0.9,
                        ease: "power2.out",
                        clearProps: 'transform',
                        onComplete: () => {
                            gsap.set(homeBtn.querySelector('.link-container'), { clearProps: 'all' });
                            homeBtn.classList.remove('animating');
                        }
                    });
                }
            });

            mainContent.style.display = 'none';
            document.getElementById('project-list').style.opacity = '0';
            gsap.set('#project-list .project-inner', { yPercent: 110 });

            // Hide brand name with masked slide - each line slides up separately
            gsap.to(brandName.querySelectorAll('.name-line'), {
                yPercent: -110,
                duration: 0.5,
                stagger: 0.05,
                ease: "power2.inOut",
                onComplete: () => {
                    // After brand name is gone, show about heading from below
                    aboutHeadingEl.classList.add('active');
                    aboutSection.classList.add('active');
                    aboutHeadingEl.style.opacity = 1;

                    // Reveal ABOUT with masked slide up from below
                    gsap.set(aboutHeadingEl.querySelector('.about-title'), { yPercent: 110 });
                    gsap.to(aboutHeadingEl.querySelector('.about-title'), {
                        yPercent: 0,
                        duration: 0.5,
                        ease: "power2.inOut"
                    });

                    // Animate about text lines
                    const aboutLines = document.querySelectorAll('.about-text .split-line');
                    gsap.set(aboutLines, { yPercent: 110 });
                    gsap.to(aboutLines, {
                        yPercent: 0,
                        duration: 0.4,
                        stagger: 0.05,
                        ease: "power2.inOut",
                        delay: 0.2
                    });
                }
            });
        });

        // Home button click handler
        homeBtn.addEventListener('click', () => {
            // Add animating class to disable hover
            homeBtn.classList.add('animating');
            aboutBtn.classList.add('animating');

            // Hide Home button and reveal About button (masked slide up)
            gsap.to(homeBtn.querySelector('.link-container'), {
                yPercent: -110,
                duration: 0.8,
                ease: "power2.in",
                onComplete: () => {
                    homeBtn.style.display = 'none';
                    homeBtn.classList.remove('animating');
                    aboutBtn.style.display = 'flex';
                    gsap.set(aboutBtn.querySelector('.link-container'), { yPercent: 110 });
                    gsap.to(aboutBtn.querySelector('.link-container'), {
                        yPercent: 0,
                        duration: 0.9,
                        ease: "power2.out",
                        clearProps: 'transform',
                        onComplete: () => {
                            gsap.set(aboutBtn.querySelector('.link-container'), { clearProps: 'all' });
                            aboutBtn.classList.remove('animating');
                        }
                    });
                }
            });

            // Hide about text lines first with masked slide up
            const aboutLines = document.querySelectorAll('.about-text .split-line');
            gsap.to(aboutLines, {
                yPercent: -110,
                duration: 0.4,
                stagger: 0.04,
                ease: "power2.inOut",
                onComplete: () => {
                    // Then hide ABOUT heading with masked slide up
                    gsap.to(aboutHeadingEl.querySelector('.about-title'), {
                        yPercent: -110,
                        duration: 0.5,
                        ease: "power2.inOut",
                        onComplete: () => {
                            aboutSection.classList.remove('active');
                            aboutHeadingEl.classList.remove('active');

                            // After ABOUT is gone, reveal brand name from below - each line separately
                            gsap.set(brandName.querySelectorAll('.name-line'), { yPercent: 110 });
                            gsap.to(brandName.querySelectorAll('.name-line'), {
                                yPercent: 0,
                                duration: 0.5,
                                stagger: 0.05,
                                ease: "power2.inOut"
                            });
                            mainContent.style.display = 'flex';
                            gsap.to('#project-list', { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.2 });
                            gsap.to('#project-list .project-inner',
                                { yPercent: 0, duration: 0.5, stagger: 0.06, ease: 'osmo-ease', delay: 0.3 }
                            );
                        }
                    });
                }
            });
        });

        // Click brand name/ABOUT heading to go home (only when on about page)
        brandName.addEventListener('click', () => {
            if (aboutSection.classList.contains('active')) {
                // Trigger home button click
                homeBtn.click();
            }
        });

        // Make ABOUT heading clickable too
        aboutHeadingEl.addEventListener('click', () => {
            if (aboutSection.classList.contains('active')) {
                homeBtn.click();
            }
        });
        aboutHeadingEl.style.cursor = 'pointer';

        // Make brand name clickable
        brandName.style.cursor = 'pointer';
    </script>

    <script>
        // Spring-based CountUp (mirrors CountUp component physics)
        const percentEl = document.querySelector('.loader-percentage');

        const duration  = 2;
        const stiffness = 100 * (1 / duration); // 50
        const damping   = 20 + 40 * (1 / duration); // 40

        let position = 0;
        let velocity = 0;
        let lastTime = null;

        function springStep(timestamp) {
            if (lastTime === null) lastTime = timestamp;
            const dt = Math.min((timestamp - lastTime) / 1000, 0.064);
            lastTime = timestamp;

            const force = stiffness * (100 - position) - damping * velocity;
            velocity += force * dt;
            position += velocity * dt;

            if (position >= 99.5) {
                percentEl.textContent = '100%';
                onLoadingComplete();
                return;
            }

            percentEl.textContent = Math.round(position) + '%';
            requestAnimationFrame(springStep);
        }

        // Start after a brief beat
        setTimeout(() => requestAnimationFrame(springStep), 300);

        function onLoadingComplete() {
            const exitTl = gsap.timeline();

            exitTl.to('.loader-percentage', {
                opacity: 0,
                scale: 0.9,
                duration: 0.4,
                ease: 'power2.in'
            })
                .to('.loader-wrapper', {
                    yPercent: -100,
                    duration: 1,
                    ease: 'power4.inOut',
                    onComplete: function () {
                        document.querySelector('.loader-wrapper').style.display = 'none';
                    }
                })
                .to('.brand-name', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.5')
                .to('.top-right', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.6')
                .add(() => {
                    animateMainText();
                }, '-=0.3')
                .to('#project-list', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.2')
                .add(() => {
                    gsap.to('#project-list .project-inner',
                        {
                            yPercent: 0,
                            duration: 0.6,
                            stagger: 0.08,
                            ease: 'osmo-ease'
                        }
                    );
                }, '-=0.5')
                .to('.datetime-display', {
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power2.out'
                }, '-=0.3');
        }
    </script>
    </script>
    <script>
        // Live clock
        const MONTHS = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
        const clockEl = document.getElementById('datetime-display');

        function updateClock() {
            const now = new Date();
            const month   = MONTHS[now.getMonth()];
            const day     = now.getDate();
            const year    = now.getFullYear();
            const h24     = now.getHours();
            const ampm    = h24 >= 12 ? 'PM' : 'AM';
            const hours   = String(h24 % 12 || 12).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `[ ${month} ${day}, ${year}, ${hours}:${minutes}:${seconds} ${ampm} ]`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
